<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mint Chat</title>
    <script
      src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"
      type="module"
    ></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="chat-header">
        <div class="auth-brand-icon" id="headerAvatar">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            />
          </svg>
        </div>
        <div class="header-info">
          <h1 id="chatTitle">Mint Chat</h1>
          <div class="header-status" id="headerStatus">Не подключено</div>
        </div>
        <div class="header-actions">
          <button
            class="header-btn"
            id="backBtn"
            onclick="switchToGeneral()"
            title="Общий чат"
            style="display: none"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <button
            class="header-btn"
            id="directsBtn"
            onclick="toggleSidebar()"
            title="Личные чаты"
            style="display: none"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
              />
            </svg>
          </button>
          <button
            class="header-btn"
            id="logoutBtn"
            onclick="logout()"
            title="Выйти"
            style="display: none"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="sidebar" id="directSidebar" style="display: none">
        <div class="sidebar-header">
          <h3>Личные чаты</h3>
          <button class="sidebar-close" onclick="closeSidebar()">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div id="directChatsList" class="direct-chats-list">
          <div class="empty-chats">Нет личных чатов</div>
        </div>
      </div>

      <div
        class="sidebar-overlay"
        id="sidebarOverlay"
        onclick="closeSidebar()"
        style="display: none"
      ></div>

      <!-- AUTH -->
      <div class="auth-wrapper" id="authWrapper">
        <div class="auth-section" id="authSection">
          <div class="connect-section glass-card">
            <div class="section-label">
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              Регистрация
            </div>
            <div id="regNotification" class="notification"></div>
            <div class="input-group">
              <input
                type="text"
                id="regLogin"
                placeholder=" "
                class="floating-input"
              />
              <label class="floating-label">Логин</label>
            </div>
            <div class="input-group">
              <input
                type="email"
                id="regEmail"
                placeholder=" "
                class="floating-input"
              />
              <label class="floating-label">Email</label>
            </div>
            <div class="input-group password-wrapper">
              <input
                type="password"
                id="regPassword"
                placeholder=" "
                class="floating-input"
              />
              <label class="floating-label">Пароль</label>
              <button
                type="button"
                class="eye-btn"
                onclick="togglePassword('regPassword', this)"
              >
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <button class="btn-primary" onclick="register()">
              Зарегистрироваться
            </button>
          </div>

          <div class="connect-section glass-card">
            <div class="section-label">
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              Вход
            </div>
            <div id="loginNotification" class="notification"></div>
            <div class="input-group">
              <input
                type="text"
                id="loginInput"
                placeholder=" "
                class="floating-input"
              />
              <label class="floating-label">Логин или Email</label>
            </div>
            <div class="input-group password-wrapper">
              <input
                type="password"
                id="loginPassword"
                placeholder=" "
                class="floating-input"
              />
              <label class="floating-label">Пароль</label>
              <button
                type="button"
                class="eye-btn"
                onclick="togglePassword('loginPassword', this)"
              >
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <button class="btn-primary" onclick="login()">Войти</button>
          </div>
        </div>
      </div>

      <div id="messages" style="display: none">
        <div class="empty-state">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="opacity: 0.3; margin-bottom: 10px"
          >
            <path
              d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            />
          </svg>
          <span>Нет сообщений. Начни общение!</span>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator" style="display: none">
        <span id="typingText"></span> печатает
        <span class="typing-dots"
          ><span>.</span><span>.</span><span>.</span></span
        >
      </div>

      <div class="input-container" id="inputContainer" style="display: none">
        <emoji-picker
          id="emojiPicker"
          style="display: none; position: absolute; bottom: 70px; right: 10px"
        ></emoji-picker>
        <input
          type="file"
          id="fileInput"
          accept="image/*,video/*,audio/*"
          style="display: none"
          onchange="handleFileUpload(event)"
        />
        <button onclick="toggleEmoji()" class="emoji-btn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M8 14s1.5 2 4 2 4-2 4-2" />
            <line x1="9" y1="9" x2="9.01" y2="9" />
            <line x1="15" y1="9" x2="15.01" y2="9" />
          </svg>
        </button>
        <button
          onclick="document.getElementById('fileInput').click()"
          class="attach-btn"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
            />
          </svg>
        </button>
        <input
          type="text"
          id="messageInput"
          placeholder="Написать сообщение..."
          disabled
        />
        <button onclick="sendMessage()" disabled id="sendBtn" class="send-btn">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
        <button onclick="clearChat()" class="clear-btn" id="clearBtn">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
          </svg>
        </button>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
      let socket;
      let myName = "";
      let myUserId = "";
      let currentMode = "general";
      let currentDirectChat = null;
      let typingTimeout = null;

      const messagesDiv = document.getElementById("messages");
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const authSection = document.getElementById("authSection");
      const authWrapper = document.getElementById("authWrapper");
      const headerStatus = document.getElementById("headerStatus");
      const inputContainer = document.getElementById("inputContainer");
      const headerAvatar = document.getElementById("headerAvatar");
      const chatTitle = document.getElementById("chatTitle");
      const typingIndicator = document.getElementById("typingIndicator");

      const wavePlayers = {};

      function showHeaderActions() {
        document.getElementById("directsBtn").style.display = "flex";
        document.getElementById("logoutBtn").style.display = "flex";
      }

      function hideHeaderActions() {
        document.getElementById("directsBtn").style.display = "none";
        document.getElementById("logoutBtn").style.display = "none";
        document.getElementById("backBtn").style.display = "none";
      }

      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const eyeOpen = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const eyeClosed = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
        if (input.type === "password") {
          input.type = "text";
          btn.innerHTML = eyeClosed;
        } else {
          input.type = "password";
          btn.innerHTML = eyeOpen;
        }
      }

      function generateAvatarUrl(seed) {
        return `https://api.dicebear.com/7.x/lorelei/svg?seed=${seed}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
      }

      function updateHeaderAvatar(avatarUrl) {
        const el = document.getElementById("headerAvatar");
        if (avatarUrl) {
          el.className = "header-avatar";
          el.innerHTML = `<img src="${avatarUrl}" alt="avatar" class="header-avatar-img" />`;
        } else {
          el.className = "auth-brand-icon";
          el.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
        }
      }

      function togglePlay(wavId) {
        const ws = wavePlayers[wavId];
        if (!ws) return;
        ws.playPause();
        const btn = document.getElementById(`play_${wavId}`);
        if (btn) btn.textContent = ws.isPlaying() ? "⏸" : "▶";
      }

      function toggleMute(wavId) {
        const ws = wavePlayers[wavId];
        if (!ws) return;
        const muted = ws.getMuted ? ws.getMuted() : false;
        ws.setMuted(!muted);
        const btn = document.getElementById(`vol_${wavId}`);
        if (btn) btn.textContent = !muted ? "🔇" : "🔊";
      }

      function setVolume(wavId, val) {
        const ws = wavePlayers[wavId];
        if (!ws) return;
        ws.setVolume(parseFloat(val));
        const btn = document.getElementById(`vol_${wavId}`);
        if (btn) btn.textContent = parseFloat(val) === 0 ? "🔇" : "🔊";
      }

      function initWaveSurfer(wavId, url, isMine) {
        setTimeout(() => {
          const container = document.getElementById(wavId);
          if (!container) return;
          const ws = WaveSurfer.create({
            container: `#${wavId}`,
            waveColor: isMine
              ? "rgba(255,255,255,0.35)"
              : "rgba(58,90,117,0.5)",
            progressColor: isMine
              ? "rgba(255,255,255,0.9)"
              : "rgba(102,153,187,0.9)",
            height: 44,
            barWidth: 2,
            barGap: 1,
            barRadius: 2,
            url: url,
            interact: true,
          });
          ws.on("timeupdate", (t) => {
            const el = document.getElementById(`time_${wavId}`);
            if (el) {
              const dur = ws.getDuration();
              const fmt = (s) => new Date(s * 1000).toISOString().slice(14, 19);
              el.textContent = `${fmt(t)} / ${fmt(dur || 0)}`;
            }
          });
          ws.on("finish", () => {
            const btn = document.getElementById(`play_${wavId}`);
            if (btn) btn.textContent = "▶";
          });
          wavePlayers[wavId] = ws;
        }, 150);
      }

      window.onload = () => {
        const t = localStorage.getItem("token");
        const name = localStorage.getItem("userName");
        const avatar = localStorage.getItem("userAvatar");
        if (t && name) {
          myName = name;
          authWrapper.style.display = "none";
          if (avatar) updateHeaderAvatar(avatar);
          showHeaderActions();
          headerStatus.textContent = "онлайн";
          headerStatus.className = "header-status online";
          connect();
        }
        const picker = document.getElementById("emojiPicker");
        picker.addEventListener("emoji-click", (e) => {
          messageInput.value += e.detail.unicode;
          picker.style.display = "none";
          messageInput.focus();
        });
        document.addEventListener("click", (e) => {
          const picker = document.getElementById("emojiPicker");
          const emojiBtn = document.querySelector(".emoji-btn");
          if (!picker.contains(e.target) && e.target !== emojiBtn) {
            picker.style.display = "none";
          }
        });
      };

      function toggleEmoji() {
        const picker = document.getElementById("emojiPicker");
        picker.style.display =
          picker.style.display === "none" ? "block" : "none";
      }

      async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        messageInput.value = `📎 ${file.name}`;
        messageInput.disabled = true;
        sendBtn.disabled = true;
        try {
          const formData = new FormData();
          formData.append("file", file);
          const r = await fetch("/upload/file", {
            method: "POST",
            body: formData,
          });
          if (!r.ok) throw new Error("Upload failed");
          const data = await r.json();
          if (currentMode === "general") {
            socket.emit("send_message", {
              message: "",
              fileUrl: data.url,
              fileType: data.fileType,
              fileName: data.fileName,
              avatarUrl: localStorage.getItem("userAvatar") || "",
            });
          } else if (currentMode === "direct" && currentDirectChat) {
            socket.emit("send_direct", {
              toUserId: currentDirectChat.userId,
              toUserName: currentDirectChat.userName,
              message: "",
              fileUrl: data.url,
              fileType: data.fileType,
              fileName: data.fileName,
              avatarUrl: localStorage.getItem("userAvatar") || "",
            });
          }
          messageInput.value = "";
        } catch (error) {
          showNotification(
            "loginNotification",
            "Ошибка загрузки файла",
            "error",
          );
          messageInput.value = "";
        } finally {
          messageInput.disabled = false;
          sendBtn.disabled = false;
          document.getElementById("fileInput").value = "";
        }
      }

      function showNotification(id, msg, type) {
        const n = document.getElementById(id);
        n.textContent = msg;
        n.className = `notification ${type} show`;
        setTimeout(() => n.classList.remove("show"), 4000);
      }

      async function register() {
        const login = document.getElementById("regLogin").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        if (!login || !email || !password) {
          return showNotification(
            "regNotification",
            "Заполни все поля",
            "error",
          );
        }
        const r = await fetch("/auth/registration", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ login, email, password }),
        });
        if (r.ok) {
          showNotification(
            "regNotification",
            "Регистрация успешна! Войди.",
            "success",
          );
          document.getElementById("regLogin").value = "";
          document.getElementById("regEmail").value = "";
          document.getElementById("regPassword").value = "";
        } else {
          const data = await r.json();
          const msg = data.errors?.[0]?.msg || "Ошибка регистрации";
          showNotification("regNotification", msg, "error");
        }
      }

      async function login() {
        const loginOrEmail = document.getElementById("loginInput").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!loginOrEmail || !password) {
          return showNotification(
            "loginNotification",
            "Заполни все поля",
            "error",
          );
        }
        const r = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ loginOrEmail, password }),
        });
        if (r.ok) {
          const d = await r.json();
          localStorage.setItem("token", d.accessToken);
          localStorage.setItem("userName", loginOrEmail);
          myName = loginOrEmail;
          showNotification("loginNotification", "Вход выполнен!", "success");
          showHeaderActions();
          headerStatus.textContent = "онлайн";
          headerStatus.className = "header-status online";
          authSection.classList.add("hide");
          setTimeout(() => {
            authWrapper.style.display = "none";
            connect();
          }, 400);
        } else {
          showNotification(
            "loginNotification",
            "Неверный логин или пароль",
            "error",
          );
        }
      }

      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("userName");
        localStorage.removeItem("userAvatar");
        if (socket) socket.disconnect();
        if (window._refreshInterval) clearInterval(window._refreshInterval);
        messagesDiv.style.display = "none";
        inputContainer.style.display = "none";
        authWrapper.style.display = "flex";
        authSection.classList.remove("hide");
        headerStatus.textContent = "Не подключено";
        headerStatus.className = "header-status";
        headerAvatar.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
        headerAvatar.className = "auth-brand-icon";
        messageInput.disabled = true;
        sendBtn.disabled = true;
        messagesDiv.innerHTML =
          '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:10px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Нет сообщений. Начни общение!</span></div>';
        currentMode = "general";
        currentDirectChat = null;
        chatTitle.textContent = "Mint Chat";
        hideHeaderActions();
        typingIndicator.style.display = "none";
      }

      async function refreshAccessToken() {
        try {
          const r = await fetch("/auth/refresh", {
            method: "POST",
            credentials: "include",
          });
          if (r.ok) {
            const d = await r.json();
            localStorage.setItem("token", d.accessToken);
            return d.accessToken;
          }
        } catch (e) {}
        return null;
      }

      async function connect() {
        let token = localStorage.getItem("token");
        if (!token) return;

        try {
          const payload = JSON.parse(atob(token.split(".")[1]));
          const expiresIn = payload.exp * 1000 - Date.now();
          if (expiresIn < 60000) {
            const newToken = await refreshAccessToken();
            if (newToken) token = newToken;
          }
        } catch (e) {}

        if (socket) socket.disconnect();
        socket = io({ auth: { token } });
        console.log("Socket created:", socket);
        let wasConnected = false;
        socket.on("connect", () => {
          console.log("Socket connected!", socket.id);
          wasConnected = true;
          headerStatus.textContent = "онлайн";
          headerStatus.className = "header-status online";
          messageInput.disabled = false;
          sendBtn.disabled = false;
          messagesDiv.style.display = "flex";
          inputContainer.style.display = "flex";
          try {
            const payload = JSON.parse(atob(token.split(".")[1]));
            myUserId = payload.userId;
          } catch (e) {
            console.error("Failed to parse token:", e);
          }
          loadDirectChats();

          if (window._refreshInterval) clearInterval(window._refreshInterval);
          window._refreshInterval = setInterval(
            async () => {
              const newToken = await refreshAccessToken();
              if (newToken) {
                token = newToken;
                socket.auth.token = newToken;
              }
            },
            14 * 60 * 1000,
          );
        });
        socket.on("disconnect", (reason) => {
          console.log(
            "Socket disconnected, reason:",
            reason,
            "wasConnected:",
            wasConnected,
          );
          if (wasConnected && reason !== "io client disconnect") {
            headerStatus.textContent = "офлайн";
            headerStatus.className = "header-status";
            messageInput.disabled = true;
            sendBtn.disabled = true;
          }
        });
        socket.on("message_history", (m) => {
          if (currentMode !== "general") return;
          messagesDiv.innerHTML = "";
          if (m.length === 0) {
            messagesDiv.innerHTML =
              '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:10px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Нет сообщений. Начни общение!</span></div>';
          } else {
            m.forEach((msg) => addMessage(msg, msg.userId));
          }
        });
        socket.on("new_message", (msg) => {
          if (currentMode === "general") addMessage(msg, msg.userId);
        });
        socket.on("direct_history", ({ messages }) => {
          messagesDiv.innerHTML = "";
          if (messages.length === 0) {
            messagesDiv.innerHTML =
              '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:10px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Нет сообщений. Начни общение!</span></div>';
          } else {
            messages.forEach((msg) => addDirectMessage(msg, true));
          }
          if (currentDirectChat)
            socket.emit("mark_read", { toUserId: currentDirectChat.userId });
        });
        socket.on("new_direct_message", (msg) => {
          const myPaddedId = myUserId ? String(myUserId).padStart(24, "0") : "";
          const fromId = String(msg.fromUserId).padStart(24, "0");
          const chatUserId = currentDirectChat
            ? String(currentDirectChat.userId).padStart(24, "0")
            : "";
          const isFromMe = fromId === myPaddedId;
          const isInThisChat =
            currentMode === "direct" &&
            !!currentDirectChat &&
            chatUserId === fromId;
          if (!isFromMe && !isInThisChat) {
            playNotificationSound();
          }
          if (currentMode === "direct") {
            addDirectMessage(msg);
            if (currentDirectChat && !isFromMe) {
              socket.emit("mark_read", { toUserId: currentDirectChat.userId });
            }
          }
          loadDirectChats();
        });
        socket.on("direct_chats", (chats) => {
          renderDirectChatsList(chats);
        });
        socket.on("direct_cleared", () => {
          messagesDiv.innerHTML =
            '<div class="empty-state"><span>История очищена</span></div>';
        });
        socket.on("user_typing", (data) => {
          if (currentMode === "direct") {
            document.getElementById("typingText").textContent = data.userName;
            typingIndicator.style.display = "flex";
          }
        });
        socket.on("user_stop_typing", () => {
          typingIndicator.style.display = "none";
        });
        socket.on("messages_read", () => {
          document.querySelectorAll(".read-status").forEach((el) => {
            el.textContent = "✓✓";
            el.classList.add("read");
          });
          loadDirectChats();
        });
      }

      messageInput.addEventListener("input", () => {
        if (currentMode === "direct" && currentDirectChat) {
          socket.emit("typing_direct", { toUserId: currentDirectChat.userId });
          clearTimeout(typingTimeout);
          typingTimeout = setTimeout(() => {
            socket.emit("stop_typing_direct", {
              toUserId: currentDirectChat.userId,
            });
          }, 1500);
        }
      });

      messageInput.addEventListener("blur", () => {
        if (currentMode === "direct" && currentDirectChat && typingTimeout) {
          clearTimeout(typingTimeout);
          socket.emit("stop_typing_direct", {
            toUserId: currentDirectChat.userId,
          });
        }
      });

      function addMessage(msg, userId) {
        const emptyState = messagesDiv.querySelector(".empty-state");
        if (emptyState) emptyState.remove();
        const isMine = msg.userName === myName;
        const div = document.createElement("div");
        div.className = "message " + (isMine ? "mine" : "theirs");
        const time = new Date(msg.createdAt).toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit",
        });
        const avatarUrl = msg.avatarUrl || generateAvatarUrl(msg.userName);
        const userIdStr = userId ? userId.toString() : "";
        let fileContent = "";
        if (msg.fileUrl) {
          const isAudio =
            msg.fileType === "audio" ||
            msg.fileUrl.match(/\.(mp3|wav|ogg|aac|m4a)$/i);
          const isVideo = msg.fileType === "video" && !isAudio;
          if (msg.fileType === "image") {
            fileContent = `<img src="${msg.fileUrl}" class="msg-image" onclick="window.open('${msg.fileUrl}', '_blank')">`;
          } else if (isVideo) {
            fileContent = `<video controls class="msg-video"><source src="${msg.fileUrl}"></video>`;
          } else if (isAudio) {
            const wavId = `wave_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
            const cleanName = (msg.fileName || "").substring(0, 30);
            fileContent = `<div class="audio-card"><div class="audio-cover-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><div class="audio-bottom"><div class="audio-filename">${cleanName}</div><div class="audio-row"><button class="play-btn" id="play_${wavId}" onclick="togglePlay('${wavId}')">▶</button><div id="${wavId}" class="waveform"></div></div><div class="audio-footer"><span class="audio-time" id="time_${wavId}">0:00 / 0:00</span><div class="volume-row"><button class="volume-btn" onclick="toggleMute('${wavId}')" id="vol_${wavId}">🔊</button><input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume('${wavId}', this.value)" /></div></div></div></div>`;
            setTimeout(() => initWaveSurfer(wavId, msg.fileUrl, isMine), 200);
          } else {
            fileContent = `<a href="${msg.fileUrl}" target="_blank" class="msg-file">📎 ${msg.fileName}</a>`;
          }
        }
        const avatarClick = isMine
          ? ""
          : `onclick="showUserMenu('${userIdStr}', '${msg.userName}', '${avatarUrl}')"`;
        div.innerHTML = `<img src="${avatarUrl}" class="msg-avatar" alt="${msg.userName}" ${avatarClick} style="${isMine ? "" : "cursor: pointer;"}" /><div class="message-content">${!isMine ? `<div class="message-meta"><span class="message-name">${msg.userName}</span></div>` : ""}<div class="message-bubble">${msg.message ? `<div class="message-text">${msg.message}</div>` : ""}${fileContent}</div><div class="message-time">${time}</div></div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function addDirectMessage(msg, isHistory = false) {
        const emptyState = messagesDiv.querySelector(".empty-state");
        if (emptyState) emptyState.remove();
        const isMine = msg.fromUserName === myName;
        const div = document.createElement("div");
        div.className = "message " + (isMine ? "mine" : "theirs");
        const time = new Date(msg.createdAt).toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit",
        });
        const avatarUrl = msg.fromAvatarUrl;
        const userName = msg.fromUserName;
        const readStatus = isMine ? "✓" : "";
        const readClass = isMine ? "read-status" : "";
        let fileContent = "";
        if (msg.fileUrl) {
          const isAudio =
            msg.fileType === "audio" ||
            msg.fileUrl.match(/\.(mp3|wav|ogg|aac|m4a)$/i);
          const isVideo = msg.fileType === "video" && !isAudio;
          if (msg.fileType === "image") {
            fileContent = `<img src="${msg.fileUrl}" class="msg-image" onclick="window.open('${msg.fileUrl}', '_blank')">`;
          } else if (isVideo) {
            fileContent = `<video controls class="msg-video"><source src="${msg.fileUrl}"></video>`;
          } else if (isAudio) {
            const wavId = `wave_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
            const cleanName = (msg.fileName || "").substring(0, 30);
            fileContent = `<div class="audio-card"><div class="audio-cover-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><div class="audio-bottom"><div class="audio-filename">${cleanName}</div><div class="audio-row"><button class="play-btn" id="play_${wavId}" onclick="togglePlay('${wavId}')">▶</button><div id="${wavId}" class="waveform"></div></div><div class="audio-footer"><span class="audio-time" id="time_${wavId}">0:00 / 0:00</span><div class="volume-row"><button class="volume-btn" onclick="toggleMute('${wavId}')" id="vol_${wavId}">🔊</button><input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume('${wavId}', this.value)" /></div></div></div></div>`;
            setTimeout(() => initWaveSurfer(wavId, msg.fileUrl, isMine), 200);
          } else {
            fileContent = `<a href="${msg.fileUrl}" target="_blank" class="msg-file">📎 ${msg.fileName}</a>`;
          }
        }
        div.innerHTML = `<img src="${avatarUrl}" class="msg-avatar" alt="${userName}" /><div class="message-content">${!isMine ? `<div class="message-meta"><span class="message-name">${userName}</span></div>` : ""}<div class="message-bubble">${msg.message ? `<div class="message-text">${msg.message}</div>` : ""}${fileContent}</div><div class="message-footer"><span class="message-time">${time}</span>${isMine ? `<span class="${readClass}">${readStatus}</span>` : ""}</div></div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      let audioCtx = null;

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      document.addEventListener("click", initAudio, { once: false });

      function playNotificationSound() {
        try {
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = "sine";
          osc.frequency.setValueAtTime(820, audioCtx.currentTime);
          osc.frequency.setValueAtTime(660, audioCtx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(
            0.001,
            audioCtx.currentTime + 0.35,
          );
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + 0.35);
        } catch (e) {}
      }

      function sendMessage() {
        const m = messageInput.value.trim();
        if (!m) return;
        if (currentMode === "general") {
          socket.emit("send_message", {
            message: m,
            avatarUrl: localStorage.getItem("userAvatar") || "",
          });
        } else if (currentMode === "direct" && currentDirectChat) {
          clearTimeout(typingTimeout);
          socket.emit("stop_typing_direct", {
            toUserId: currentDirectChat.userId,
          });
          socket.emit("send_direct", {
            toUserId: currentDirectChat.userId,
            toUserName: currentDirectChat.userName,
            message: m,
            avatarUrl: localStorage.getItem("userAvatar") || "",
          });
        }
        messageInput.value = "";
      }

      async function clearChat() {
        if (currentMode === "general") {
          if (!confirm("Удалить всю историю общего чата?")) return;
          const r = await fetch("/chat/clear-messages", { method: "DELETE" });
          if (r.ok) {
            messagesDiv.innerHTML =
              '<div class="empty-state"><span>История очищена</span></div>';
          }
        } else if (currentMode === "direct" && currentDirectChat) {
          if (!confirm("Удалить историю личного чата?")) return;
          socket.emit("clear_direct", { toUserId: currentDirectChat.userId });
        }
      }

      function showUserMenu(userId, userName, avatarUrl) {
        if (userName === myName) return;
        if (confirm(`Написать личное сообщение ${userName}?`)) {
          openDirectChat(userId, userName, avatarUrl);
        }
      }

      function openDirectChat(userId, userName, avatarUrl) {
        currentMode = "direct";

        const paddedId = String(userId).match(/^\d+$/)
          ? String(userId).padStart(24, "0")
          : userId;
        currentDirectChat = { userId: paddedId, userName, avatarUrl };
        chatTitle.textContent = userName;
        updateHeaderAvatar(avatarUrl);
        document.getElementById("backBtn").style.display = "flex";
        document.getElementById("directsBtn").style.display = "none";
        typingIndicator.style.display = "none";
        socket.emit("join_direct", { toUserId: userId });
        closeSidebar();
      }

      function switchToGeneral() {
        currentMode = "general";
        currentDirectChat = null;
        chatTitle.textContent = "Mint Chat";
        updateHeaderAvatar(localStorage.getItem("userAvatar"));
        document.getElementById("backBtn").style.display = "none";
        document.getElementById("directsBtn").style.display = "flex";
        typingIndicator.style.display = "none";
        messagesDiv.innerHTML = "";
        fetch("/chat/messages", {
          headers: { Authorization: `Bearer ${localStorage.getItem("token")}` },
        })
          .then((r) => r.json())
          .then((messages) => {
            if (Array.isArray(messages))
              messages.forEach((m) => addMessage(m, m.userId));
          })
          .catch(() => {});
      }

      function toggleSidebar() {
        const sidebar = document.getElementById("directSidebar");
        const overlay = document.getElementById("sidebarOverlay");
        if (sidebar.style.display === "none") {
          sidebar.style.display = "block";
          overlay.style.display = "block";
          loadDirectChats();
        } else {
          closeSidebar();
        }
      }

      function closeSidebar() {
        document.getElementById("directSidebar").style.display = "none";
        document.getElementById("sidebarOverlay").style.display = "none";
      }

      function loadDirectChats() {
        if (socket && socket.connected) socket.emit("get_direct_chats");
      }

      function renderDirectChatsList(chats) {
        const list = document.getElementById("directChatsList");
        if (!chats || chats.length === 0) {
          list.innerHTML = '<div class="empty-chats">Нет личных чатов</div>';
          return;
        }
        list.innerHTML = chats
          .map((chat) => {
            const isFromMe = chat.fromUserName === myName;
            const otherUserId = isFromMe ? chat.toUserId : chat.fromUserId;
            const otherUserName = isFromMe
              ? chat.toUserName
              : chat.fromUserName;
            const otherUserAvatar = isFromMe
              ? generateAvatarUrl(chat.toUserName)
              : chat.fromAvatarUrl;
            const preview = chat.message
              ? chat.message.substring(0, 30)
              : "Медиа";
            const time = new Date(chat.createdAt).toLocaleTimeString("ru-RU", {
              hour: "2-digit",
              minute: "2-digit",
            });
            const unreadBadge =
              !isFromMe && !chat.isRead
                ? '<span class="unread-badge"></span>'
                : "";
            return `<div class="chat-item" onclick="openDirectChat('${otherUserId}', '${otherUserName}', '${otherUserAvatar}')"><img src="${otherUserAvatar}" class="chat-avatar" /><div class="chat-info"><div class="chat-name">${otherUserName}${unreadBadge}</div><div class="chat-preview">${preview}</div></div><div class="chat-time">${time}</div></div>`;
          })
          .join("");
      }

      messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });
      document
        .getElementById("loginPassword")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") login();
        });
      document
        .getElementById("regPassword")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") register();
        });
    </script>
  </body>
</html>
