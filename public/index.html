<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mint Chat</title>
    <script
      src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"
      type="module"
    ></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="/css/call.css" />
    <style>
      .menu-wrapper {
        position: relative;
      }
      .dropdown-menu {
        display: none;
        position: absolute;
        top: 36px;
        right: 0;
        background: #1e2a35;
        border: 1px solid rgba(58, 90, 117, 0.3);
        border-radius: 10px;
        min-width: 160px;
        z-index: 100;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        overflow: hidden;
      }
      .dropdown-menu.open {
        display: block;
      }
      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 16px;
        color: #cdd6e0;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.15s;
        font-family: "DM Sans", sans-serif;
      }
      .dropdown-item:hover {
        background: rgba(58, 90, 117, 0.15);
      }
      .dropdown-item.danger {
        color: #f87171;
      }
      .dropdown-item svg {
        flex-shrink: 0;
        opacity: 0.8;
      }
      .mic-btn {
        width: 36px !important;
        height: 36px;
        border-radius: 50% !important;
        padding: 0 !important;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent !important;
        border: 1px solid var(--border) !important;
        color: var(--text-secondary) !important;
        flex-shrink: 0;
        transition: all var(--transition) !important;
      }
      .mic-btn:hover {
        background: var(--accent-dim) !important;
        border-color: var(--border-mid) !important;
        color: var(--accent-light) !important;
      }
      .mic-btn.recording {
        border-color: rgba(248, 113, 113, 0.4) !important;
        color: #f87171 !important;
        background: rgba(239, 68, 68, 0.08) !important;
        animation: pulse-mic 1s infinite;
      }
      @keyframes pulse-mic {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .recording-indicator {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 0 8px;
        color: #f87171;
        font-size: 13px;
        flex: 1;
        font-family: "DM Sans", sans-serif;
      }
      .recording-indicator.active {
        display: flex;
      }
      .rec-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f87171;
        animation: pulse-mic 1s infinite;
        flex-shrink: 0;
      }
      .voice-preview {
        display: none;
        align-items: center;
        gap: 6px;
        flex: 1;
        padding: 0 4px;
      }
      .voice-preview.active {
        display: flex;
      }
      .voice-mini-player {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bg-card);
        border: 1px solid var(--border-mid);
        border-radius: 22px;
        padding: 6px 12px;
        min-width: 0;
      }
      .voice-play-btn {
        width: 28px !important;
        height: 28px !important;
        border-radius: 50% !important;
        padding: 0 !important;
        font-size: 10px;
        font-weight: 700;
        line-height: 1 !important;
        background: var(--blue-mid) !important;
        color: var(--text-primary) !important;
        border: 1px solid rgba(58, 90, 117, 0.4) !important;
        flex-shrink: 0;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        transition: all var(--transition) !important;
      }
      .voice-play-btn:hover {
        background: var(--blue-vivid) !important;
        transform: scale(1.05) !important;
      }
      .voice-duration {
        font-size: 12px;
        font-family: "DM Mono", monospace;
        color: var(--text-secondary);
        flex-shrink: 0;
      }
      .voice-waveform-placeholder {
        flex: 1;
        height: 6px;
        background: rgba(58, 90, 117, 0.4);
        border-radius: 3px;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }
      .voice-waveform-placeholder::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: var(--progress, 0%);
        height: 100%;
        background: var(--accent);
        transition: width 0.1s linear;
      }
      .voice-action-btn {
        width: 32px !important;
        height: 32px !important;
        border-radius: 50% !important;
        padding: 0 !important;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent !important;
        flex-shrink: 0;
        transition: all var(--transition) !important;
      }
      .voice-action-btn.send {
        border: 1px solid rgba(76, 175, 137, 0.3) !important;
        color: #4caf89 !important;
      }
      .voice-action-btn.send:hover {
        background: rgba(76, 175, 137, 0.1) !important;
        border-color: rgba(76, 175, 137, 0.5) !important;
        transform: scale(1.05) !important;
      }
      .voice-action-btn.discard {
        border: 1px solid rgba(239, 68, 68, 0.2) !important;
        color: #f87171 !important;
      }
      .voice-action-btn.discard:hover {
        background: rgba(239, 68, 68, 0.08) !important;
        border-color: rgba(239, 68, 68, 0.4) !important;
        transform: scale(1.05) !important;
      }
      .call-btn {
        width: 32px !important;
        height: 32px;
        border-radius: 50% !important;
        padding: 0 !important;
        background: transparent !important;
        border: 1px solid var(--border) !important;
        color: var(--text-secondary) !important;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition) !important;
      }
      .call-btn:hover {
        background: var(--accent-dim) !important;
        border-color: var(--border-mid) !important;
        color: var(--accent-light) !important;
      }
    </style>
  </head>
  <body>
    <div class="call-modal" id="callModal" style="display: none">
      <div class="call-modal-card">
        <img class="call-modal-avatar" id="callModalAvatar" alt="avatar" />
        <video
          id="localVideo"
          autoplay
          muted
          playsinline
          style="display: none"
        ></video>
        <video
          id="remoteVideo"
          autoplay
          playsinline
          style="display: none"
        ></video>
        <div class="call-modal-name" id="callModalName"></div>
        <div class="call-modal-status" id="callModalStatus"></div>
        <div class="call-modal-timer" id="callModalTimer" style="display: none">
          0:00
        </div>

        <div
          class="call-modal-actions"
          id="callActionsIncoming"
          style="display: none"
        >
          <button class="call-action-btn accept" onclick="acceptCall()">
            <svg
              width="26"
              height="26"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.36 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"
              />
            </svg>
          </button>
          <button class="call-action-btn reject" onclick="rejectCall()">
            <svg
              width="26"
              height="26"
              viewBox="0 0 24 24"
              fill="white"
              stroke="none"
            >
              <path
                d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.32-.56-3.56 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"
                transform="rotate(135 12 12)"
              />
            </svg>
          </button>
        </div>

        <div
          class="call-modal-actions"
          id="callActionsOutgoing"
          style="display: none"
        >
          <button class="call-action-btn end" onclick="cancelCall()">
            <svg
              width="26"
              height="26"
              viewBox="0 0 24 24"
              fill="white"
              stroke="none"
            >
              <path
                d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.32-.56-3.56 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"
                transform="rotate(135 12 12)"
              />
            </svg>
          </button>
        </div>

        <div
          class="call-modal-actions"
          id="callActionsActive"
          style="display: none"
        >
          <button
            class="call-action-btn mute"
            id="muteBtn"
            onclick="toggleCallMute()"
          >
            <svg
              id="iconMic"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
            <svg
              id="iconMicMuted"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="display: none"
            >
              <line x1="1" y1="1" x2="23" y2="23" />
              <path
                d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"
              />
              <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>
          <button
            class="call-action-btn camera"
            id="cameraBtn"
            onclick="toggleCamera()"
            style="display: none"
          >
            <svg
              id="iconCamera"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M23 7l-7 5 7 5V7z" />
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
            </svg>
            <svg
              id="iconCameraOff"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="display: none"
            >
              <line x1="1" y1="1" x2="23" y2="23" />
              <path
                d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h1a2 2 0 0 1 2 2v9.34"
              />
              <path d="M23 7l-7 5 7 5V7z" opacity="0.5" />
            </svg>
          </button>
          <button class="call-action-btn end" onclick="endCallActive()">
            <svg
              width="26"
              height="26"
              viewBox="0 0 24 24"
              fill="white"
              stroke="none"
            >
              <path
                d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.32-.56-3.56 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"
                transform="rotate(135 12 12)"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="chat-header">
        <div class="auth-brand-icon" id="headerAvatar">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            />
          </svg>
        </div>
        <div class="header-info">
          <h1 id="chatTitle">Mint Chat</h1>
          <div class="header-status" id="headerStatus">Не подключено</div>
        </div>
        <div class="header-actions">
          <button
            class="header-btn"
            id="backBtn"
            onclick="switchToGeneral()"
            title="Назад"
            style="display: none"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <button
            class="call-btn"
            id="callBtn"
            title="Аудио звонок"
            style="display: none"
            onclick="startCall()"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.36 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"
              />
            </svg>
          </button>
          <button
            class="call-btn"
            id="videoCallBtn"
            title="Видео звонок"
            style="display: none"
            onclick="startVideoCall()"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M23 7l-7 5 7 5V7z" />
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
            </svg>
          </button>
          <button
            class="header-btn"
            id="directsBtn"
            onclick="toggleSidebar()"
            title="Личные чаты"
            style="display: none"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
              />
            </svg>
          </button>
          <div class="menu-wrapper" id="menuWrapper" style="display: none">
            <button class="header-btn" onclick="toggleMenu()" title="Меню">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="5" r="1" />
                <circle cx="12" cy="12" r="1" />
                <circle cx="12" cy="19" r="1" />
              </svg>
            </button>
            <div class="dropdown-menu" id="dropdownMenu">
              <div class="dropdown-item danger" onclick="clearChatFromMenu()">
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="3 6 5 6 21 6" />
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                  <path d="M10 11v6" />
                  <path d="M14 11v6" />
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                </svg>
                Очистить чат
              </div>
              <div class="dropdown-item danger" onclick="logout()">
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Выйти
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="sidebar" id="directSidebar" style="display: none">
        <div class="sidebar-header">
          <h3>Личные чаты</h3>
          <button class="sidebar-close" onclick="closeSidebar()">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div id="directChatsList" class="direct-chats-list">
          <div class="empty-chats">Нет личных чатов</div>
        </div>
      </div>

      <div
        class="sidebar-overlay"
        id="sidebarOverlay"
        onclick="closeSidebar()"
        style="display: none"
      ></div>

      <div class="auth-wrapper" id="authWrapper">
        <div class="auth-section" id="authSection">
          <div class="connect-section glass-card">
            <div class="section-label">
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              Регистрация
            </div>
            <div id="regNotification" class="notification"></div>
            <div class="input-group">
              <input
                type="text"
                id="regLogin"
                placeholder=" "
                class="floating-input"
              /><label class="floating-label">Логин</label>
            </div>
            <div class="input-group">
              <input
                type="email"
                id="regEmail"
                placeholder=" "
                class="floating-input"
              /><label class="floating-label">Email</label>
            </div>
            <div class="input-group password-wrapper">
              <input
                type="password"
                id="regPassword"
                placeholder=" "
                class="floating-input"
              />
              <label class="floating-label">Пароль</label>
              <button
                type="button"
                class="eye-btn"
                onclick="togglePassword('regPassword', this)"
              >
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <button class="btn-primary" onclick="register()">
              Зарегистрироваться
            </button>
          </div>
          <div class="connect-section glass-card">
            <div class="section-label">
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              Вход
            </div>
            <div id="loginNotification" class="notification"></div>
            <div class="input-group">
              <input
                type="text"
                id="loginInput"
                placeholder=" "
                class="floating-input"
              /><label class="floating-label">Логин или Email</label>
            </div>
            <div class="input-group password-wrapper">
              <input
                type="password"
                id="loginPassword"
                placeholder=" "
                class="floating-input"
              />
              <label class="floating-label">Пароль</label>
              <button
                type="button"
                class="eye-btn"
                onclick="togglePassword('loginPassword', this)"
              >
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <button class="btn-primary" onclick="login()">Войти</button>
          </div>
        </div>
      </div>

      <div id="messages" style="display: none">
        <div class="empty-state">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="opacity: 0.3; margin-bottom: 10px"
          >
            <path
              d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            />
          </svg>
          <span>Нет сообщений. Начни общение!</span>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator" style="display: none">
        <span id="typingText"></span> печатает
        <span class="typing-dots"
          ><span>.</span><span>.</span><span>.</span></span
        >
      </div>

      <div class="input-container" id="inputContainer" style="display: none">
        <emoji-picker
          id="emojiPicker"
          style="display: none; position: absolute; bottom: 70px; right: 10px"
        ></emoji-picker>
        <input
          type="file"
          id="fileInput"
          accept="image/*,video/*,audio/*"
          style="display: none"
          onchange="handleFileUpload(event)"
        />
        <button
          onclick="document.getElementById('fileInput').click()"
          class="attach-btn"
          id="attachBtn"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
            />
          </svg>
        </button>
        <div class="recording-indicator" id="recordingIndicator">
          <div class="rec-dot"></div>
          <span id="recTimer">0:00</span>
          <span style="color: var(--text-muted); font-size: 12px"
            >Запись...</span
          >
        </div>
        <div class="voice-preview" id="voicePreview">
          <div class="voice-mini-player">
            <button
              class="voice-play-btn"
              id="voicePlayBtn"
              onclick="toggleVoicePlay()"
            >
              ▶
            </button>
            <div
              class="voice-waveform-placeholder"
              id="voiceWaveform"
              onclick="seekVoice(event)"
            ></div>
            <span class="voice-duration" id="voiceDuration">0:00</span>
          </div>
          <button
            class="voice-action-btn discard"
            onclick="discardVoice()"
            title="Удалить"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            </svg>
          </button>
          <button
            class="voice-action-btn send"
            onclick="sendVoice()"
            title="Отправить"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
        <input
          type="text"
          id="messageInput"
          placeholder="Сообщение..."
          disabled
        />
        <button onclick="toggleEmoji()" class="emoji-btn" id="emojiBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M8 14s1.5 2 4 2 4-2 4-2" />
            <line x1="9" y1="9" x2="9.01" y2="9" />
            <line x1="15" y1="9" x2="15.01" y2="9" />
          </svg>
        </button>
        <button
          class="mic-btn"
          id="micBtn"
          onclick="toggleRecording()"
          title="Голосовое сообщение"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </button>
        <button
          onclick="sendMessage()"
          id="sendBtn"
          class="send-btn"
          style="display: none"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/js/call.js"></script>
    <script>
      let socket;
      let myName = "";
      let myUserId = "";
      let currentMode = "general";
      let currentDirectChat = null;
      let typingTimeout = null;
      let mediaRecorder = null;
      let audioChunks = [];
      let isRecording = false;
      let recTimerInterval = null;
      let recSeconds = 0;
      let voiceBlob = null;
      let voiceAudioEl = null;
      let voicePlaying = false;
      let voiceProgressInterval = null;

      const messagesDiv = document.getElementById("messages");
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const micBtn = document.getElementById("micBtn");
      const emojiBtn = document.getElementById("emojiBtn");
      const attachBtn = document.getElementById("attachBtn");
      const authSection = document.getElementById("authSection");
      const authWrapper = document.getElementById("authWrapper");
      const headerStatus = document.getElementById("headerStatus");
      const inputContainer = document.getElementById("inputContainer");
      const headerAvatar = document.getElementById("headerAvatar");
      const chatTitle = document.getElementById("chatTitle");
      const typingIndicator = document.getElementById("typingIndicator");
      const recordingIndicator = document.getElementById("recordingIndicator");
      const voicePreview = document.getElementById("voicePreview");
      const wavePlayers = {};

      messageInput.addEventListener("input", () => {
        const hasText = messageInput.value.trim().length > 0;
        sendBtn.style.display = hasText ? "flex" : "none";
        micBtn.style.display = hasText ? "none" : "flex";
        if (currentMode === "direct" && currentDirectChat) {
          socket.emit("typing_direct", { toUserId: currentDirectChat.userId });
          clearTimeout(typingTimeout);
          typingTimeout = setTimeout(() => {
            socket.emit("stop_typing_direct", {
              toUserId: currentDirectChat.userId,
            });
          }, 1500);
        }
      });

      messageInput.addEventListener("blur", () => {
        if (currentMode === "direct" && currentDirectChat && typingTimeout) {
          clearTimeout(typingTimeout);
          socket.emit("stop_typing_direct", {
            toUserId: currentDirectChat.userId,
          });
        }
      });

      function toggleMenu() {
        document.getElementById("dropdownMenu").classList.toggle("open");
      }

      document.addEventListener("click", (e) => {
        const wrapper = document.getElementById("menuWrapper");
        if (wrapper && !wrapper.contains(e.target))
          document.getElementById("dropdownMenu")?.classList.remove("open");
        const picker = document.getElementById("emojiPicker");
        const eb = document.querySelector(".emoji-btn");
        if (picker && !picker.contains(e.target) && e.target !== eb)
          picker.style.display = "none";
      });

      function clearChatFromMenu() {
        document.getElementById("dropdownMenu").classList.remove("open");
        clearChat();
      }

      async function toggleRecording() {
        if (isRecording) stopRecording();
        else await startRecording();
      }

      async function startRecording() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          audioChunks = [];
          voiceBlob = null;
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioChunks.push(e.data);
          };
          mediaRecorder.onstop = () => {
            voiceBlob = new Blob(audioChunks, { type: "audio/webm" });
            stream.getTracks().forEach((t) => t.stop());
            showVoicePreview();
          };
          mediaRecorder.start();
          isRecording = true;
          micBtn.classList.add("recording");
          messageInput.style.display = "none";
          emojiBtn.style.display = "none";
          attachBtn.style.display = "none";
          recordingIndicator.classList.add("active");
          recSeconds = 0;
          recTimerInterval = setInterval(() => {
            recSeconds++;
            const m = Math.floor(recSeconds / 60);
            const s = recSeconds % 60;
            document.getElementById("recTimer").textContent =
              `${m}:${s.toString().padStart(2, "0")}`;
          }, 1000);
        } catch (err) {
          alert("Нет доступа к микрофону");
        }
      }

      function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== "inactive")
          mediaRecorder.stop();
        isRecording = false;
        micBtn.classList.remove("recording");
        recordingIndicator.classList.remove("active");
        clearInterval(recTimerInterval);
      }

      function showVoicePreview() {
        const url = URL.createObjectURL(voiceBlob);
        voiceAudioEl = new Audio(url);
        voiceAudioEl.onended = () => {
          voicePlaying = false;
          document.getElementById("voicePlayBtn").textContent = "▶";
          clearInterval(voiceProgressInterval);
          document
            .getElementById("voiceWaveform")
            .style.setProperty("--progress", "0%");
        };
        voiceAudioEl.onloadedmetadata = () => {
          const dur = voiceAudioEl.duration;
          const m = Math.floor(dur / 60);
          const s = Math.floor(dur % 60);
          document.getElementById("voiceDuration").textContent =
            `${m}:${s.toString().padStart(2, "0")}`;
        };
        voicePreview.classList.add("active");
        micBtn.style.display = "none";
      }

      function toggleVoicePlay() {
        if (!voiceAudioEl) return;
        if (voicePlaying) {
          voiceAudioEl.pause();
          voicePlaying = false;
          document.getElementById("voicePlayBtn").textContent = "▶";
          clearInterval(voiceProgressInterval);
        } else {
          voiceAudioEl.play();
          voicePlaying = true;
          document.getElementById("voicePlayBtn").textContent = "⏸";
          voiceProgressInterval = setInterval(() => {
            if (voiceAudioEl && voiceAudioEl.duration) {
              const pct = (
                (voiceAudioEl.currentTime / voiceAudioEl.duration) *
                100
              ).toFixed(1);
              document
                .getElementById("voiceWaveform")
                .style.setProperty("--progress", `${pct}%`);
            }
          }, 100);
        }
      }

      function seekVoice(e) {
        if (!voiceAudioEl || !voiceAudioEl.duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const pct = Math.max(
          0,
          Math.min(1, (e.clientX - rect.left) / rect.width),
        );
        voiceAudioEl.currentTime = pct * voiceAudioEl.duration;
        document
          .getElementById("voiceWaveform")
          .style.setProperty("--progress", `${(pct * 100).toFixed(1)}%`);
        const m = Math.floor(voiceAudioEl.currentTime / 60);
        const s = Math.floor(voiceAudioEl.currentTime % 60);
        document.getElementById("voiceDuration").textContent =
          `${m}:${s.toString().padStart(2, "0")}`;
      }

      function discardVoice() {
        if (voiceAudioEl) {
          voiceAudioEl.pause();
          voiceAudioEl = null;
        }
        voiceBlob = null;
        voicePlaying = false;
        clearInterval(voiceProgressInterval);
        voicePreview.classList.remove("active");
        messageInput.style.display = "";
        emojiBtn.style.display = "";
        attachBtn.style.display = "";
        micBtn.style.display = "flex";
        document.getElementById("voicePlayBtn").textContent = "▶";
        document
          .getElementById("voiceWaveform")
          .style.setProperty("--progress", "0%");
      }

      async function sendVoice() {
        if (!voiceBlob) return;
        try {
          const formData = new FormData();
          formData.append("file", voiceBlob, `voice_${Date.now()}.webm`);
          const r = await fetch("/upload/file", {
            method: "POST",
            body: formData,
          });
          if (!r.ok) throw new Error("Upload failed");
          const data = await r.json();
          const payload = {
            message: "",
            fileUrl: data.url,
            fileType: "audio",
            fileName: `voice_${Date.now()}.webm`,
            avatarUrl: localStorage.getItem("userAvatar") || "",
          };
          if (currentMode === "general") {
            socket.emit("send_message", payload);
          } else if (currentMode === "direct" && currentDirectChat) {
            socket.emit("send_direct", {
              ...payload,
              toUserId: currentDirectChat.userId,
              toUserName: currentDirectChat.userName,
            });
          }
          discardVoice();
        } catch (err) {
          showNotification(
            "loginNotification",
            "Ошибка отправки голосового",
            "error",
          );
        }
      }

      function showHeaderActions() {
        document.getElementById("directsBtn").style.display = "flex";
        document.getElementById("menuWrapper").style.display = "flex";
      }
      function hideHeaderActions() {
        document.getElementById("directsBtn").style.display = "none";
        document.getElementById("menuWrapper").style.display = "none";
        document.getElementById("backBtn").style.display = "none";
        document.getElementById("callBtn").style.display = "none";
        document.getElementById("videoCallBtn").style.display = "none";
      }

      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const eyeOpen = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const eyeClosed = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
        if (input.type === "password") {
          input.type = "text";
          btn.innerHTML = eyeClosed;
        } else {
          input.type = "password";
          btn.innerHTML = eyeOpen;
        }
      }

      function generateAvatarUrl(seed) {
        return `https://api.dicebear.com/7.x/lorelei/svg?seed=${seed}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
      }

      function updateHeaderAvatar(avatarUrl) {
        const el = document.getElementById("headerAvatar");
        if (avatarUrl) {
          el.className = "header-avatar";
          el.innerHTML = `<img src="${avatarUrl}" alt="avatar" class="header-avatar-img" />`;
        } else {
          el.className = "auth-brand-icon";
          el.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
        }
      }

      function togglePlay(wavId) {
        const ws = wavePlayers[wavId];
        if (!ws) return;
        ws.playPause();
        const btn = document.getElementById(`play_${wavId}`);
        if (btn) btn.textContent = ws.isPlaying() ? "⏸" : "▶";
      }
      function toggleMute(wavId) {
        const ws = wavePlayers[wavId];
        if (!ws) return;
        const muted = ws.getMuted ? ws.getMuted() : false;
        ws.setMuted(!muted);
        const btn = document.getElementById(`vol_${wavId}`);
        if (btn) btn.textContent = !muted ? "🔇" : "🔊";
      }
      function setVolume(wavId, val) {
        const ws = wavePlayers[wavId];
        if (!ws) return;
        ws.setVolume(parseFloat(val));
        const btn = document.getElementById(`vol_${wavId}`);
        if (btn) btn.textContent = parseFloat(val) === 0 ? "🔇" : "🔊";
      }

      function initWaveSurfer(wavId, url, isMine) {
        setTimeout(() => {
          const container = document.getElementById(wavId);
          if (!container) return;
          const ws = WaveSurfer.create({
            container: `#${wavId}`,
            waveColor: isMine
              ? "rgba(255,255,255,0.35)"
              : "rgba(58,90,117,0.5)",
            progressColor: isMine
              ? "rgba(255,255,255,0.9)"
              : "rgba(102,153,187,0.9)",
            height: 44,
            barWidth: 2,
            barGap: 1,
            barRadius: 2,
            url,
            interact: true,
          });
          ws.on("timeupdate", (t) => {
            const el = document.getElementById(`time_${wavId}`);
            if (el) {
              const dur = ws.getDuration();
              const fmt = (s) => new Date(s * 1000).toISOString().slice(14, 19);
              el.textContent = `${fmt(t)} / ${fmt(dur || 0)}`;
            }
          });
          ws.on("finish", () => {
            const btn = document.getElementById(`play_${wavId}`);
            if (btn) btn.textContent = "▶";
          });
          wavePlayers[wavId] = ws;
        }, 150);
      }

      window.onload = async () => {
        const t = localStorage.getItem("token");
        const name = localStorage.getItem("userName");
        const avatar = localStorage.getItem("userAvatar");
        if (t && name) {
          myName = name;
          authWrapper.style.display = "none";
          if (avatar) updateHeaderAvatar(avatar);
          showHeaderActions();
          headerStatus.textContent = "подключение...";
          headerStatus.className = "header-status";
          await connect();
        }
        const picker = document.getElementById("emojiPicker");
        picker.addEventListener("emoji-click", (e) => {
          messageInput.value += e.detail.unicode;
          picker.style.display = "none";
          messageInput.focus();
          const hasText = messageInput.value.trim().length > 0;
          sendBtn.style.display = hasText ? "flex" : "none";
          micBtn.style.display = hasText ? "none" : "flex";
        });
      };

      function toggleEmoji() {
        const picker = document.getElementById("emojiPicker");
        picker.style.display =
          picker.style.display === "none" ? "block" : "none";
      }

      async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        messageInput.value = `📎 ${file.name}`;
        messageInput.disabled = true;
        sendBtn.style.display = "none";
        micBtn.style.display = "none";
        try {
          const formData = new FormData();
          formData.append("file", file);
          const r = await fetch("/upload/file", {
            method: "POST",
            body: formData,
          });
          if (!r.ok) throw new Error("Upload failed");
          const data = await r.json();
          if (currentMode === "general") {
            socket.emit("send_message", {
              message: "",
              fileUrl: data.url,
              fileType: data.fileType,
              fileName: data.fileName,
              avatarUrl: localStorage.getItem("userAvatar") || "",
            });
          } else if (currentMode === "direct" && currentDirectChat) {
            socket.emit("send_direct", {
              toUserId: currentDirectChat.userId,
              toUserName: currentDirectChat.userName,
              message: "",
              fileUrl: data.url,
              fileType: data.fileType,
              fileName: data.fileName,
              avatarUrl: localStorage.getItem("userAvatar") || "",
            });
          }
          messageInput.value = "";
        } catch (error) {
          showNotification(
            "loginNotification",
            "Ошибка загрузки файла",
            "error",
          );
          messageInput.value = "";
        } finally {
          messageInput.disabled = false;
          micBtn.style.display = "flex";
          sendBtn.style.display = "none";
          document.getElementById("fileInput").value = "";
        }
      }

      function showNotification(id, msg, type) {
        const n = document.getElementById(id);
        n.textContent = msg;
        n.className = `notification ${type} show`;
        setTimeout(() => n.classList.remove("show"), 4000);
      }

      async function register() {
        const login = document.getElementById("regLogin").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        if (!login || !email || !password)
          return showNotification(
            "regNotification",
            "Заполни все поля",
            "error",
          );
        const r = await fetch("/auth/registration", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ login, email, password }),
        });
        if (r.ok) {
          showNotification(
            "regNotification",
            "Регистрация успешна! Войди.",
            "success",
          );
          document.getElementById("regLogin").value = "";
          document.getElementById("regEmail").value = "";
          document.getElementById("regPassword").value = "";
        } else {
          const data = await r.json();
          showNotification(
            "regNotification",
            data.errors?.[0]?.msg || "Ошибка регистрации",
            "error",
          );
        }
      }

      async function login() {
        const loginOrEmail = document.getElementById("loginInput").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!loginOrEmail || !password)
          return showNotification(
            "loginNotification",
            "Заполни все поля",
            "error",
          );
        const r = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ loginOrEmail, password }),
        });
        if (r.ok) {
          const d = await r.json();
          localStorage.setItem("token", d.accessToken);
          localStorage.setItem("userName", loginOrEmail);
          myName = loginOrEmail;
          showNotification("loginNotification", "Вход выполнен!", "success");
          showHeaderActions();
          headerStatus.textContent = "подключение...";
          headerStatus.className = "header-status";
          authSection.classList.add("hide");
          setTimeout(async () => {
            authWrapper.style.display = "none";
            await connect();
          }, 400);
        } else {
          showNotification(
            "loginNotification",
            "Неверный логин или пароль",
            "error",
          );
        }
      }

      function logout() {
        document.getElementById("dropdownMenu")?.classList.remove("open");
        localStorage.removeItem("token");
        localStorage.removeItem("userName");
        localStorage.removeItem("userAvatar");
        if (socket) socket.disconnect();
        if (window._refreshInterval) clearInterval(window._refreshInterval);
        messagesDiv.style.display = "none";
        inputContainer.style.display = "none";
        authWrapper.style.display = "flex";
        authSection.classList.remove("hide");
        headerStatus.textContent = "Не подключено";
        headerStatus.className = "header-status";
        headerAvatar.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
        headerAvatar.className = "auth-brand-icon";
        messageInput.disabled = true;
        messagesDiv.innerHTML =
          '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:10px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Нет сообщений. Начни общение!</span></div>';
        currentMode = "general";
        currentDirectChat = null;
        chatTitle.textContent = "Mint Chat";
        hideHeaderActions();
        typingIndicator.style.display = "none";
      }

      async function refreshAccessToken() {
        try {
          const r = await fetch("/auth/refresh", {
            method: "POST",
            credentials: "include",
          });
          if (r.ok) {
            const d = await r.json();
            localStorage.setItem("token", d.accessToken);
            return d.accessToken;
          }
        } catch (e) {}
        return null;
      }

      async function getValidToken() {
        let token = localStorage.getItem("token");
        if (!token) return null;
        try {
          const payload = JSON.parse(atob(token.split(".")[1]));
          const expiresIn = payload.exp * 1000 - Date.now();
          if (expiresIn < 14 * 60 * 1000) {
            const newToken = await refreshAccessToken();
            if (newToken) return newToken;
          }
          return token;
        } catch (e) {
          return await refreshAccessToken();
        }
      }

      async function connect() {
        const token = await getValidToken();
        if (!token) {
          logout();
          return;
        }
        if (socket) socket.disconnect();
        socket = io({ auth: { token } });
        socket.on("connect", () => {
          headerStatus.textContent = "онлайн";
          headerStatus.className = "header-status online";
          messageInput.disabled = false;
          messagesDiv.style.display = "flex";
          inputContainer.style.display = "flex";
          micBtn.style.display = "flex";
          sendBtn.style.display = "none";
          try {
            const payload = JSON.parse(atob(token.split(".")[1]));
            myUserId = payload.userId;
          } catch (e) {}
          loadDirectChats();
          if (window._refreshInterval) clearInterval(window._refreshInterval);
          window._refreshInterval = setInterval(
            async () => {
              const newToken = await refreshAccessToken();
              if (newToken && socket) socket.auth.token = newToken;
            },
            14 * 60 * 1000,
          );
          if (typeof setupCallSocketEvents === "function")
            setupCallSocketEvents(socket);
        });
        socket.on("disconnect", (reason) => {
          if (reason === "io client disconnect") return;
          headerStatus.textContent = "переподключение...";
          headerStatus.className = "header-status";
          messageInput.disabled = true;
          setTimeout(async () => {
            if (!localStorage.getItem("token")) return;
            await connect();
          }, 2000);
        });
        socket.on("connect_error", async (err) => {
          if (
            err.message === "Unauthorized: Invalid token" ||
            err.message === "Unauthorized: No token provided"
          ) {
            const newToken = await refreshAccessToken();
            if (newToken) {
              socket.auth.token = newToken;
              socket.connect();
            } else {
              logout();
            }
          }
        });
        socket.on("message_history", (m) => {
          if (currentMode !== "general") return;
          messagesDiv.innerHTML = "";
          if (m.length === 0)
            messagesDiv.innerHTML =
              '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:10px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Нет сообщений. Начни общение!</span></div>';
          else m.forEach((msg) => addMessage(msg, msg.userId));
        });
        socket.on("new_message", (msg) => {
          if (currentMode === "general") addMessage(msg, msg.userId);
        });
        socket.on("direct_history", ({ messages }) => {
          messagesDiv.innerHTML = "";
          if (messages.length === 0)
            messagesDiv.innerHTML =
              '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:10px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Нет сообщений. Начни общение!</span></div>';
          else messages.forEach((msg) => addDirectMessage(msg, true));
          if (currentDirectChat)
            socket.emit("mark_read", { toUserId: currentDirectChat.userId });
        });
        socket.on("new_direct_message", (msg) => {
          const myPaddedId = myUserId ? String(myUserId).padStart(24, "0") : "";
          const fromId = String(msg.fromUserId).padStart(24, "0");
          const chatUserId = currentDirectChat
            ? String(currentDirectChat.userId).padStart(24, "0")
            : "";
          const isFromMe = fromId === myPaddedId;
          const isInThisChat =
            currentMode === "direct" &&
            !!currentDirectChat &&
            chatUserId === fromId;
          if (!isFromMe && !isInThisChat) playNotificationSound();
          if (currentMode === "direct") {
            addDirectMessage(msg);
            if (currentDirectChat && !isFromMe)
              socket.emit("mark_read", { toUserId: currentDirectChat.userId });
          }
          loadDirectChats();
        });
        socket.on("direct_chats", (chats) => renderDirectChatsList(chats));
        socket.on("direct_cleared", () => {
          messagesDiv.innerHTML =
            '<div class="empty-state"><span>История очищена</span></div>';
        });
        socket.on("user_typing", (data) => {
          if (currentMode === "direct") {
            document.getElementById("typingText").textContent = data.userName;
            typingIndicator.style.display = "flex";
          }
        });
        socket.on("user_stop_typing", () => {
          typingIndicator.style.display = "none";
        });
        socket.on("messages_read", () => {
          document.querySelectorAll(".read-status").forEach((el) => {
            el.textContent = "✓✓";
            el.classList.add("read");
          });
          loadDirectChats();
        });
      }

      function buildAudioCard(msg, isMine) {
        const wavId = `wave_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
        const cleanName = (msg.fileName || "").substring(0, 30);
        setTimeout(() => initWaveSurfer(wavId, msg.fileUrl, isMine), 200);
        return `<div class="audio-card"><div class="audio-cover-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><div class="audio-bottom"><div class="audio-filename">${cleanName}</div><div class="audio-row"><button class="play-btn" id="play_${wavId}" onclick="togglePlay('${wavId}')">▶</button><div id="${wavId}" class="waveform"></div></div><div class="audio-footer"><span class="audio-time" id="time_${wavId}">0:00 / 0:00</span><div class="volume-row"><button class="volume-btn" onclick="toggleMute('${wavId}')" id="vol_${wavId}">🔊</button><input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume('${wavId}', this.value)" /></div></div></div></div>`;
      }

      function buildFileContent(msg, isMine) {
        if (!msg.fileUrl) return "";
        const isAudio =
          msg.fileType === "audio" ||
          msg.fileUrl.match(/\.(mp3|wav|ogg|aac|m4a|webm)$/i);
        const isVideo = msg.fileType === "video" && !isAudio;
        if (msg.fileType === "image")
          return `<img src="${msg.fileUrl}" class="msg-image" onclick="window.open('${msg.fileUrl}', '_blank')">`;
        if (isVideo)
          return `<video controls class="msg-video"><source src="${msg.fileUrl}"></video>`;
        if (isAudio) return buildAudioCard(msg, isMine);
        return `<a href="${msg.fileUrl}" target="_blank" class="msg-file">📎 ${msg.fileName}</a>`;
      }

      function addMessage(msg, userId) {
        const emptyState = messagesDiv.querySelector(".empty-state");
        if (emptyState) emptyState.remove();
        const isMine = msg.userName === myName;
        const div = document.createElement("div");
        div.className = "message " + (isMine ? "mine" : "theirs");
        const time = new Date(msg.createdAt).toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit",
        });
        const avatarUrl = msg.avatarUrl || generateAvatarUrl(msg.userName);
        const userIdStr = userId ? userId.toString() : "";
        const fileContent = buildFileContent(msg, isMine);
        const avatarClick = isMine
          ? ""
          : `onclick="showUserMenu('${userIdStr}', '${msg.userName}', '${avatarUrl}')"`;
        div.innerHTML = `<img src="${avatarUrl}" class="msg-avatar" alt="${msg.userName}" ${avatarClick} style="${isMine ? "" : "cursor:pointer;"}" /><div class="message-content">${!isMine ? `<div class="message-meta"><span class="message-name">${msg.userName}</span></div>` : ""}<div class="message-bubble">${msg.message ? `<div class="message-text">${msg.message}</div>` : ""}${fileContent}</div><div class="message-time">${time}</div></div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function addDirectMessage(msg, isHistory = false) {
        const emptyState = messagesDiv.querySelector(".empty-state");
        if (emptyState) emptyState.remove();
        const isMine = msg.fromUserName === myName;
        const div = document.createElement("div");
        div.className = "message " + (isMine ? "mine" : "theirs");
        const time = new Date(msg.createdAt).toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit",
        });
        const fileContent = buildFileContent(msg, isMine);
        const readStatus = isMine ? "✓" : "";
        const readClass = isMine ? "read-status" : "";
        div.innerHTML = `<img src="${msg.fromAvatarUrl}" class="msg-avatar" alt="${msg.fromUserName}" /><div class="message-content">${!isMine ? `<div class="message-meta"><span class="message-name">${msg.fromUserName}</span></div>` : ""}<div class="message-bubble">${msg.message ? `<div class="message-text">${msg.message}</div>` : ""}${fileContent}</div><div class="message-footer"><span class="message-time">${time}</span>${isMine ? `<span class="${readClass}">${readStatus}</span>` : ""}</div></div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      let audioCtx = null;
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          window.audioCtx = audioCtx;
        }
      }
      document.addEventListener("click", initAudio, { once: false });

      function playNotificationSound() {
        try {
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = "sine";
          osc.frequency.setValueAtTime(820, audioCtx.currentTime);
          osc.frequency.setValueAtTime(660, audioCtx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(
            0.001,
            audioCtx.currentTime + 0.35,
          );
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + 0.35);
        } catch (e) {}
      }

      function sendMessage() {
        const m = messageInput.value.trim();
        if (!m) return;
        if (currentMode === "general") {
          socket.emit("send_message", {
            message: m,
            avatarUrl: localStorage.getItem("userAvatar") || "",
          });
        } else if (currentMode === "direct" && currentDirectChat) {
          clearTimeout(typingTimeout);
          socket.emit("stop_typing_direct", {
            toUserId: currentDirectChat.userId,
          });
          socket.emit("send_direct", {
            toUserId: currentDirectChat.userId,
            toUserName: currentDirectChat.userName,
            message: m,
            avatarUrl: localStorage.getItem("userAvatar") || "",
          });
        }
        messageInput.value = "";
        sendBtn.style.display = "none";
        micBtn.style.display = "flex";
      }

      async function clearChat() {
        if (currentMode === "general") {
          if (!confirm("Удалить всю историю общего чата?")) return;
          const r = await fetch("/chat/clear-messages", { method: "DELETE" });
          if (r.ok)
            messagesDiv.innerHTML =
              '<div class="empty-state"><span>История очищена</span></div>';
        } else if (currentMode === "direct" && currentDirectChat) {
          if (!confirm("Удалить историю личного чата?")) return;
          socket.emit("clear_direct", { toUserId: currentDirectChat.userId });
        }
      }

      function showUserMenu(userId, userName, avatarUrl) {
        if (userName === myName) return;
        if (confirm(`Написать личное сообщение ${userName}?`))
          openDirectChat(userId, userName, avatarUrl);
      }

      function openDirectChat(userId, userName, avatarUrl) {
        currentMode = "direct";
        const paddedId = String(userId).match(/^\d+$/)
          ? String(userId).padStart(24, "0")
          : userId;
        currentDirectChat = { userId: paddedId, userName, avatarUrl };
        chatTitle.textContent = userName;
        updateHeaderAvatar(avatarUrl);
        document.getElementById("backBtn").style.display = "flex";
        document.getElementById("callBtn").style.display = "flex";
        document.getElementById("videoCallBtn").style.display = "flex";
        document.getElementById("directsBtn").style.display = "none";
        typingIndicator.style.display = "none";
        socket.emit("join_direct", { toUserId: userId });
        closeSidebar();
      }

      function switchToGeneral() {
        currentMode = "general";
        currentDirectChat = null;
        chatTitle.textContent = "Mint Chat";
        updateHeaderAvatar(localStorage.getItem("userAvatar"));
        document.getElementById("backBtn").style.display = "none";
        document.getElementById("callBtn").style.display = "none";
        document.getElementById("videoCallBtn").style.display = "none";
        document.getElementById("directsBtn").style.display = "flex";
        typingIndicator.style.display = "none";
        messagesDiv.innerHTML = "";
        fetch("/chat/messages", {
          headers: { Authorization: `Bearer ${localStorage.getItem("token")}` },
        })
          .then((r) => r.json())
          .then((messages) => {
            if (Array.isArray(messages))
              messages.forEach((m) => addMessage(m, m.userId));
          })
          .catch(() => {});
      }

      function toggleSidebar() {
        const sidebar = document.getElementById("directSidebar");
        const overlay = document.getElementById("sidebarOverlay");
        if (sidebar.style.display === "none") {
          sidebar.style.display = "block";
          overlay.style.display = "block";
          loadDirectChats();
        } else closeSidebar();
      }
      function closeSidebar() {
        document.getElementById("directSidebar").style.display = "none";
        document.getElementById("sidebarOverlay").style.display = "none";
      }
      function loadDirectChats() {
        if (socket && socket.connected) socket.emit("get_direct_chats");
      }

      function renderDirectChatsList(chats) {
        const list = document.getElementById("directChatsList");
        if (!chats || chats.length === 0) {
          list.innerHTML = '<div class="empty-chats">Нет личных чатов</div>';
          return;
        }
        list.innerHTML = chats
          .map((chat) => {
            const isFromMe = chat.fromUserName === myName;
            const otherUserId = isFromMe ? chat.toUserId : chat.fromUserId;
            const otherUserName = isFromMe
              ? chat.toUserName
              : chat.fromUserName;
            const otherUserAvatar = isFromMe
              ? generateAvatarUrl(chat.toUserName)
              : chat.fromAvatarUrl;
            const preview = chat.message
              ? chat.message.substring(0, 30)
              : "Медиа";
            const time = new Date(chat.createdAt).toLocaleTimeString("ru-RU", {
              hour: "2-digit",
              minute: "2-digit",
            });
            const unreadBadge =
              !isFromMe && !chat.isRead
                ? '<span class="unread-badge"></span>'
                : "";
            return `<div class="chat-item" onclick="openDirectChat('${otherUserId}', '${otherUserName}', '${otherUserAvatar}')"><img src="${otherUserAvatar}" class="chat-avatar" /><div class="chat-info"><div class="chat-name">${otherUserName}${unreadBadge}</div><div class="chat-preview">${preview}</div></div><div class="chat-time">${time}</div></div>`;
          })
          .join("");
      }

      messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });
      document
        .getElementById("loginPassword")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") login();
        });
      document
        .getElementById("regPassword")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") register();
        });
    </script>
  </body>
</html>
